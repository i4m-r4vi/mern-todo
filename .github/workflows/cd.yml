name: MERN CD

on:
  push: 
    branches: [main]

jobs:
  deploy:
    runs-on:
      ubuntu-latest
    
    steps:
      - name: Execute remote SSH commands using password
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd mern-todo
            git pull origin main
            DOCKER_BUILDKIT=0
            docker-compose down
            docker-compose up --build -d